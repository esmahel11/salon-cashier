<!DOCTYPE html>
<html dir="rtl" lang="ku">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#4a90e2" />
    <meta name="description" content="سیستەمی کاشێری ئارایشتگای خانمان" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="کاشێری سالۆن" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />
    <title>سیستەمی کاشێری ئارایشتگا</title>
  </head>
  <body>
    <noscript>پێویستە جاڤاسکریپت چالاک بکەیت بۆ بەکارهێنانی ئەم سیستەمە</noscript>
    <div id="root"></div>
    <script>
      // تۆمارکردنی Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%PUBLIC_URL%/service-worker.js')
            .then((registration) => {
              console.log('Service Worker تۆمارکرا:', registration.scope);
            })
            .catch((error) => {
              console.log('Service Worker تۆمار نەکرا:', error);
            });
        });
      }
    </script>
  </body>
</html>
